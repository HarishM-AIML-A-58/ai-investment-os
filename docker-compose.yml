name: ai-investment-os

x-backend-env: &backend-env
  ENVIRONMENT: ${ENVIRONMENT:-development}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_USER: ${POSTGRES_USER:-aios}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aios}
  POSTGRES_DB: ${POSTGRES_DB:-aios}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  GATEWAY_URL: ${GATEWAY_URL:-http://gateway:5000}
  AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
  AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
  AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-}
  AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${AZURE_OPENAI_EMBEDDING_DEPLOYMENT:-}

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aios}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aios}
      POSTGRES_DB: ${POSTGRES_DB:-aios}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aios} -d ${POSTGRES_DB:-aios}"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [internal]

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [internal]

  backend:
    build:
      context: ./backend
    environment: *backend-env
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./backend:/app
      - ~/.mcp-auth:/root/.mcp-auth
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [internal]

  celery_worker:
    build:
      context: ./backend
    environment: *backend-env
    command: ["celery", "-A", "app.jobs.celery_app", "worker", "--loglevel=info"]
    volumes:
      - ./backend:/app
      - ~/.mcp-auth:/root/.mcp-auth
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [internal]

  celery_beat:
    build:
      context: ./backend
    environment: *backend-env
    command: ["celery", "-A", "app.jobs.celery_app", "beat", "--loglevel=info"]
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
    networks: [internal]

  frontend:
    build:
      context: ./frontend
      target: development
    environment:
      API_BASE: ${API_BASE:-http://backend:8000}
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:5001}
    ports:
      - "5000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks: [internal]



volumes:
  pgdata:

networks:
  internal:
