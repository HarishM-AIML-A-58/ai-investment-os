# Production overrides: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
name: ai-investment-os

services:
  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  backend:
    restart: unless-stopped
    # Multiple workers behind nginx; do not expose the port publicly.
    command:
      - "gunicorn"
      - "app.main:app"
      - "-k"
      - "uvicorn.workers.UvicornWorker"
      - "-w"
      - "4"
      - "-b"
      - "0.0.0.0:8000"
    ports: []

  celery_worker:
    restart: unless-stopped

  celery_beat:
    restart: unless-stopped

  frontend:
    restart: unless-stopped
    ports: []

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
    networks: [internal]
